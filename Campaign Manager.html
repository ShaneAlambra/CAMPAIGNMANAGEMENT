<!DOCTYPE html>
<html lang="en" data-style="clean">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadence — Campaign Manager</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- App styles -->
  <link href="css/app.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="logo-mark"><i class="bi bi-broadcast-pin"></i></span>
        <span>Cadence</span>
      </div>
      <nav class="nav-scroll"></nav>
      <div style="padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px">
        <span class="cell-avatar" style="background:#4f46e5;width:32px;height:32px">MC</span>
        <div style="line-height:1.2"><div style="color:#fff;font-size:13px;font-weight:600">Maya Chen</div><div style="color:#6b7480;font-size:11.5px">Admin</div></div>
        <a href="login.html" title="Sign out" style="margin-left:auto;color:#6b7480"><i class="bi bi-box-arrow-right"></i></a>
      </div>
    </aside>
    <div class="scrim-mobile"></div>

    <!-- ===================== MAIN ===================== -->
    <div class="main-col">
      <header class="topbar">
        <button class="icon-btn menu-toggle"><i class="bi bi-list"></i></button>
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search campaigns, leads, contacts…">
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Help"><i class="bi bi-question-circle"></i></button>
          <button class="icon-btn" id="bell-btn" title="Notifications"><i class="bi bi-bell"></i><span class="dot" id="bell-dot"></span></button>
          <button class="icon-btn" id="gear-btn" title="Settings"><i class="bi bi-gear"></i></button>
          <span class="avatar">MC</span>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <div id="tweaks-root"></div>

  <!-- ===================== LIBS ===================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- ===================== APP ===================== -->
  <script src="js/api.js"></script>
  <script>
    // Protect the app: bounce to login if there's no valid token.
    if (!API.auth.guard()) { throw new Error("redirecting to login"); }
    // Sign-out link in the sidebar should clear the token first.
    document.addEventListener("DOMContentLoaded", () => {
      const out = document.querySelector('a[title="Sign out"]');
      if (out) out.addEventListener("click", (e) => { e.preventDefault(); API.auth.logout(); location.href = "login.html"; });
      // Personalise the sidebar avatar/name from the logged-in user.
      const u = API.auth.user;
      if (u) {
        const nameEl = document.querySelector('.sidebar [style*="font-weight:600"]');
        if (nameEl) nameEl.textContent = u.name;
        const roleEl = nameEl && nameEl.nextElementSibling;
        if (roleEl) roleEl.textContent = u.role;
      }
    });
  </script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modules1.js"></script>
  <script src="js/modules2.js"></script>
  <script src="js/app.js"></script>

  <!-- ===================== TWEAKS (React island) ===================== -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
